{% extends 'base.html' %}
{% block title %}Paramètres — TheGarden Labs{% endblock %}
{% block content %}
<section class="dashboard-section">
    <div class="dashboard-header">
        <h1>Paramètres du compte</h1>
        <a href="{{ url_for('dashboard') }}" class="btn btn--sm btn--ghost">← Mon compte</a>
    </div>

    <div style="display:flex;flex-direction:column;gap:1.5rem;max-width:560px;">

        <!-- Profil -->
        <div class="dashboard-block">
            <div class="dashboard-block__header"><h2>Profil</h2></div>
            <form method="POST" enctype="multipart/form-data" class="auth-form">
                <input type="hidden" name="action" value="profile" />

                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
                    {% if user.avatar %}
                    <img src="{{ url_for('static', filename='avatars/' + user.avatar) }}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--clr-border);" />
                    {% else %}
                    <div style="width:64px;height:64px;border-radius:50%;background:var(--clr-surface);border:2px solid var(--clr-border);display:flex;align-items:center;justify-content:center;color:var(--clr-text-muted);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    </div>
                    {% endif %}
                    <div>
                        <label style="display:block;font-size:0.82rem;color:var(--clr-text-muted);margin-bottom:0.3rem;">Photo de profil (max 2 Mo)</label>
                        <input type="file" name="avatar" accept="image/*" style="font-size:0.85rem;color:var(--clr-text-muted);" />
                    </div>
                </div>

                <label for="username">Pseudo</label>
                <input type="text" id="username" name="username" value="{{ user.username or '' }}" required minlength="2" maxlength="32" />

                <label for="discord">Pseudo Discord</label>
                <input type="text" id="discord" name="discord" value="{{ user.discord or '' }}" placeholder="pseudo#0000" />

                <button type="submit" class="btn btn--primary btn--block" style="margin-top:1rem;">Enregistrer le profil</button>
            </form>
        </div>

        <!-- Changer l'email -->
        <div class="dashboard-block">
            <div class="dashboard-block__header"><h2>Changer l'adresse email</h2></div>
            <form method="POST" class="auth-form">
                <input type="hidden" name="action" value="email" />
                <label>Email actuel</label>
                <input type="text" disabled value="{{ user.email }}" style="opacity:0.5;" />
                <label for="new_email">Nouvel email</label>
                <input type="email" id="new_email" name="new_email" required />
                <label for="current_password_email">Mot de passe actuel (confirmation)</label>
                <input type="password" id="current_password_email" name="current_password_email" required />
                <button type="submit" class="btn btn--outline btn--block" style="margin-top:1rem;">Changer l'email</button>
            </form>
        </div>

        <!-- Changer le mot de passe -->
        <div class="dashboard-block">
            <div class="dashboard-block__header"><h2>Changer le mot de passe</h2></div>
            <form method="POST" class="auth-form">
                <input type="hidden" name="action" value="password" />
                <label for="current_password">Mot de passe actuel</label>
                <input type="password" id="current_password" name="current_password" required />
                <label for="new_password">Nouveau mot de passe</label>
                <input type="password" id="new_password" name="new_password" required minlength="8" />
                <label for="new_password2">Confirmer le nouveau mot de passe</label>
                <input type="password" id="new_password2" name="new_password2" required minlength="8" />
                <button type="submit" class="btn btn--outline btn--block" style="margin-top:1rem;">Changer le mot de passe</button>
            </form>
        </div>

    </div>
</section>
{% endblock %}
