{% extends 'base.html' %}
{% block title %}Mot de passe oublié - TheGarden Labs{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Mot de passe oublié</h1>
        <p class="auth-card__subtitle">On t'envoie un lien pour le réinitialiser.</p>

        <form method="POST" class="auth-form">
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" required />
            <button type="submit" class="btn btn--primary btn--block">Envoyer le lien</button>
        </form>

        <p class="auth-card__footer"><a href="{{ url_for('login') }}">Retour à la connexion</a></p>
    </div>
</section>
{% endblock %}
